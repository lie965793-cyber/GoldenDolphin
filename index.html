<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>金海豚史记</title>
  <style>
    :root {
      --bg: #f4f1ea;
      --paper: rgba(255, 252, 245, 0.95);
      --ink: #1a1b1d;
      --muted: #5f646c;
      --line: #d7d1c5;
      --gold: #a06b2d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 20% 20%, rgba(47, 106, 115, 0.14), transparent 28%),
        radial-gradient(circle at 85% 10%, rgba(160, 107, 45, 0.18), transparent 24%),
        linear-gradient(180deg, #f7f2e9 0%, #ece7dc 100%);
    }
    .wrap { max-width: 1080px; margin: 0 auto; padding: 48px 20px 80px; }
    .hero, .card {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: 0 20px 60px rgba(52, 39, 21, 0.08);
    }
    .hero { padding: 36px; margin-bottom: 24px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; }
    .card { display: block; text-decoration: none; color: inherit; padding: 22px; }
    .tag {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(160, 107, 45, 0.12);
      color: var(--gold);
      font-size: 12px;
      margin-bottom: 10px;
    }
    h1 { margin: 0 0 10px; font-size: 42px; }
    h2 { margin: 0 0 8px; font-size: 24px; }
    p { margin: 0; color: var(--muted); line-height: 1.8; }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>金海豚史记</h1>
      <p>旧时期以四人冲突为主线。新金海豚时期则转向制度、协作、技术话语权，以及 Maxy、喙这类新活跃人物之间的细部互动。</p>
    </section>
    <section class="grid">
      <a class="card" href="period-analysis.html">
        <div class="tag">Periods</div>
        <h2>分期总论</h2>
        <p>分界线、标志事件与导火索。</p>
      </a>
      <a class="card" href="case-timeline.html">
        <div class="tag">Old Period</div>
        <h2>旧时期案件</h2>
        <p>主线案件与关键冲突时间线。</p>
      </a>
      <a class="card" href="character-biographies.html">
        <div class="tag">Old Period</div>
        <h2>旧时期四人角色</h2>
        <p>裤、麻、程序-策划、Eggnisi。</p>
      </a>
      <a class="card" href="new-period-figures.html">
        <div class="tag">New Period</div>
        <h2>新时期活跃人物</h2>
        <p>独立人物志页面，当前收录 Maxy 与喙，并附带清洗后的事件分析。</p>
      </a>
      <a class="card" href="hui-profile.html">
        <div class="tag">New Period</div>
        <h2>喙人物志</h2>
        <p>从素材清洗、事件分类到人物评价的完整成稿。</p>
      </a>
    </section>
  </div>
</body>
</html>
