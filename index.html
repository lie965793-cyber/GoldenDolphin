<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Golden Dolphin Records</title>
  <style>
    :root {
      --bg: #f4f1ea;
      --paper: rgba(255, 252, 245, 0.95);
      --ink: #1a1b1d;
      --muted: #5f646c;
      --line: #d7d1c5;
      --gold: #a06b2d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 20% 20%, rgba(47,106,115,.14), transparent 28%),
        radial-gradient(circle at 85% 10%, rgba(160,107,45,.18), transparent 24%),
        linear-gradient(180deg, #f7f2e9 0%, #ece7dc 100%);
    }
    .wrap { max-width: 1080px; margin: 0 auto; padding: 48px 20px 80px; }
    .hero, .card {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: 0 20px 60px rgba(52, 39, 21, .08);
    }
    .hero { padding: 36px; margin-bottom: 24px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; }
    .card { display: block; text-decoration: none; color: inherit; padding: 22px; }
    .tag {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(160,107,45,.12);
      color: var(--gold);
      font-size: 12px;
      margin-bottom: 10px;
    }
    h1 { margin: 0 0 10px; font-size: 42px; }
    h2 { margin: 0 0 8px; font-size: 24px; }
    p { margin: 0; color: var(--muted); line-height: 1.8; }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>金海豚史记</h1>
      <p>旧时期：四人冲突。新时期：管理制度冲突。</p>
    </section>
    <section class="grid">
      <a class="card" href="period-analysis.html">
        <div class="tag">Periods</div>
        <h2>分期总论</h2>
        <p>分界线 / 标志事件 / 导火索</p>
      </a>
      <a class="card" href="case-timeline.html">
        <div class="tag">Old Period</div>
        <h2>旧时期案件</h2>
        <p>主线案：19 / 27 / 38 / 56</p>
      </a>
      <a class="card" href="character-biographies.html">
        <div class="tag">Old Period</div>
        <h2>四人角色</h2>
        <p>裤 / 麻 / 程序-策划 / Eggnisi</p>
      </a>
    </section>
  </div>
</body>
</html>
