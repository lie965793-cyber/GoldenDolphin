<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>分期总论</title>
  <style>
    :root {
      --bg: #efe7dc;
      --paper: rgba(255, 251, 244, .95);
      --ink: #1f1b17;
      --muted: #62594f;
      --line: #d9cbbb;
      --gold: #99612b;
      --red: #8d3d2d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      color: var(--ink);
      background: linear-gradient(180deg, #f6efe5 0%, #ebe1d2 100%);
    }
    .wrap { max-width: 1120px; margin: 0 auto; padding: 40px 20px 80px; }
    .panel, .card {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: 0 16px 40px rgba(58, 39, 19, .08);
    }
    .panel { padding: 28px; margin-bottom: 20px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px; }
    .card { padding: 18px; }
    h1 { margin: 0 0 10px; font-size: 38px; }
    h2 { margin: 0 0 12px; font-size: 26px; }
    h3 { margin: 0 0 8px; font-size: 20px; color: var(--gold); }
    p, li { margin: 0; color: var(--muted); line-height: 1.8; }
    ul { margin: 0; padding-left: 18px; }
    .nav { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 14px; }
    .nav a { color: var(--red); text-decoration: none; font-weight: 700; }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="panel">
      <h1>分期总论</h1>
      <p>旧时期：2026-05-16 至 2026-05-31。新时期：2026-06-01 至 2026-06-04。</p>
      <div class="nav">
        <a href="index.html">首页</a>
        <a href="case-timeline.html">旧时期案件</a>
        <a href="character-biographies.html">四人角色</a>
      </div>
    </section>
    <section class="grid">
      <article class="card">
        <h3>分界线</h3>
        <p>2026-06-01</p>
      </article>
      <article class="card">
        <h3>标志事件</h3>
        <p>11:20 触怒众神</p>
      </article>
      <article class="card">
        <h3>导火索</h3>
        <p>旧案压力触碰管理阈值</p>
      </article>
      <article class="card">
        <h3>旧时期主轴</h3>
        <p>四人互撕与叙事权争夺</p>
      </article>
      <article class="card">
        <h3>新时期主轴</h3>
        <p>管理制度与普通群友摩擦</p>
      </article>
      <article class="card">
        <h3>旧时期核心案</h3>
        <p>19 / 27 / 38 / 56</p>
      </article>
    </section>
  </div>
</body>
</html>
